<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catielle Andressa</title>
  <template id="__bundler_thumbnail" data-bg-color="#FFFFFF">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="58" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#1A1A1A" text-anchor="middle">Catielle</text>
    </svg>
  </template>
  <style>
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Bold Italic.ttf') format('truetype');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Light.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('uploads/The Seasons Light Italic.ttf') format('truetype');
      font-weight: 300;
      font-style: italic;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('uploads/Poppins-Light.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('uploads/Poppins-LightItalic.ttf') format('truetype');
      font-weight: 300;
      font-style: italic;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('uploads/Poppins-ExtraLight.ttf') format('truetype');
      font-weight: 200;
      font-style: normal;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('uploads/Poppins-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --accent: #6B1E1E;
      --font-title: 'The Seasons', Georgia, serif;
      --font-body: 'Poppins', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 48px;
      padding: 28px 48px;
      mix-blend-mode: multiply;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: all 0.3s;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 48px 80px;
      gap: 48px;
    }

    .hero-title {
      font-family: var(--font-title);
      font-weight: 400;
      font-style: italic;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      letter-spacing: 0.01em;
      color: var(--text);
      text-align: center;
      line-height: 1.05;
    }

    .hero-img-wrap {
      width: 100%;
      max-width: 660px;
      display: flex;
      justify-content: center;
    }

    .hero-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* ── TYPEWRITER ── */
    .typewriter-wrap {
      text-align: center;
      padding: 28px 0 0;
      height: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .typewriter {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      color: #1A1A1A;
      white-space: nowrap;
      display: inline-block;
    }

    .typewriter .cursor {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: #1A1A1A;
      margin-left: 2px;
      vertical-align: middle;
      animation: cur-blink 1s step-end infinite;
    }

    @keyframes cur-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── DIVIDER ── */
    .hero-divider {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: #d0d0ce;
      margin: 12px auto 0;
    }

    .hero-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      width: 100%;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 0 24px 32px;
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #aaa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--accent);
    }

    /* ── MOBILE NAV ── */
    @media (max-width: 640px) {
      .hero {
        padding: 90px 24px 60px;
        gap: 32px;
      }

      .hero-title {
        font-size: clamp(2.8rem, 12vw, 4.5rem);
      }

      nav {
        padding: 22px 24px;
        justify-content: space-between;
        gap: 0;
      }

      .nav-links {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--bg);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        z-index: 200;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        font-size: 1rem;
        letter-spacing: 0.14em;
      }

      .nav-toggle {
        display: flex;
        z-index: 300;
      }

      .nav-toggle.open span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      .nav-toggle.open span:nth-child(2) {
        opacity: 0;
      }

      .nav-toggle.open span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }
  </style>
</head>
<body>

  <nav>
    <ul class="nav-links" id="navLinks">
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>


  <main class="hero">
    <div class="hero-center">
      <h1 class="hero-title">Catielle Andressa</h1>
      <div class="hero-img-wrap">
        <img
          class="hero-img"
          src="uploads/Home.png"
          alt="Catielle Andressa"
        />
      </div>
    </div>
    <div class="typewriter-wrap">
      <span class="typewriter" id="tw"><span class="cursor"></span></span>
    </div>
  </main>

  <footer>
    <div class="hero-divider"></div>
    <span>&#174; 2026 Catielle Andressa</span>
  </footer>

  <script>
    // ── Typewriter loop ──
    const tw = document.getElementById('tw');
    const cursor = tw.querySelector('.cursor');
    const text = 'bem-vindo viajante!';

    function clearText() {
      while (tw.firstChild !== cursor) {
        tw.removeChild(tw.firstChild);
      }
    }

    function type(cb) {
      let i = 0;
      function step() {
        if (i < text.length) {
          tw.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          setTimeout(step, 68 + Math.random() * 55);
        } else {
          cb && setTimeout(cb, 1400);
        }
      }
      step();
    }

    function erase(cb) {
      function step() {
        const node = cursor.previousSibling;
        if (node) {
          // remove last character
          if (node.nodeValue && node.nodeValue.length > 1) {
            node.nodeValue = node.nodeValue.slice(0, -1);
          } else {
            tw.removeChild(node);
          }
          setTimeout(step, 38 + Math.random() * 28);
        } else {
          cb && setTimeout(cb, 500);
        }
      }
      step();
    }

    function loop() {
      clearText();
      type(() => erase(loop));
    }

    setTimeout(loop, 800);

    // ── Mobile nav toggle ──
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
    });
    links.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        links.classList.remove('open');
        toggle.classList.remove('open');
      });
    });
  </script>
</body>
</html>
